<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="projectstyles.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Big Perspective</title>
  <link rel="icon" type="image/png" href="Resources/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      color: #f4f4f4;
      padding: 40px;
      animation: fadeIn 0.7s ease;
    }

    a {
      color: #89a4af;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: #1a1a1a;
      padding: 30px;
      border-radius: 10px;
    }

    img {
      max-width: 100%;
      border-radius: 6px;
      margin: 20px 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    section {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .image-with-border {
      width: 45%;
      height: auto;
      object-fit: contain;
    }

    .link-with-arrow {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .arrow-symbol {
      display: inline-block;
      font-size: 20px;
      margin-left: 3px;
      animation: slideArrow 1s ease-in-out infinite;
    }

    @keyframes slideArrow {
      0%   { transform: translateX(0); }
      50%  { transform: translateX(-6px); }
      100% { transform: translateX(0); }
    }

    .small-image {
      width: 25%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>A Big Perspective</h1>
    <p> A Big Perspective is an upcoming unofficial level editor for the game A Little Perspective.
    <div class="link-with-arrow">
      <a href="https://store.steampowered.com/app/3485300/A_Little_Perspective/">
        Check out the game here!
      </a>
      <span class="arrow-symbol">‹</span>
    </div>
    <img src="Resources/ABigPerspective.png" alt="img1" class="image-with-border" style="width: 70%;">
    <p><a href="/">Back to Main</a></p>
  </div>
</body>
</html>
