<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="projectstyles.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Big Perspective</title>
  <link rel="icon" type="image/png" href="Resources/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-image: url("Resources/element4.png");
      background-repeat: no-repeat;
      background-position: top center;
      background-size: cover;
      background-attachment: fixed;
      color: #f4f4f4;
      margin: 0;
      padding: 40px;

      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;

      animation: fadeIn 0.7s ease;
    }

    .background-element {
      position: fixed;
      z-index: -1; /* Behind the content */
      pointer-events: none;
      user-select: none;
    }

    .element1 {
      top: 20px;
      right: 20px;
      width: 300px; /* Adjust as needed */
    }

    .element2 {
      top: 20px;
      left: 20px;
      width: 300px; /* Adjust as needed */
    }

    .element3 {
      top: calc(50vh - 10px);
      right: 4px;
    }

    .element4 {
      top: calc(50vh - 300px);
      left: 4px;
    }

    a {
      color: #89a4af;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: #1a1a1a;
      padding: 30px;
      border-radius: 10px;

      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    img {
      max-width: 100%;
      border-radius: 6px;
      margin: 20px 0;
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    section {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .image-with-border {
      width: 70%;
      height: auto;
      object-fit: contain;

      border: 3px solid #353a49;
      border-radius: 6px;
    }

    .link-with-arrow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .left-arrow-symbol {
      display: inline-block;
      font-size: 20px;
      margin-left: 3px;
      animation: leftslideArrow 1s ease-in-out infinite;
    }

    .right-arrow-symbol {
      display: inline-block;
      font-size: 20px;
      margin-right: 3px;
      animation: rightslideArrow 1s ease-in-out infinite;
    }

    .small-text {
      font-size: 0.7em;
      color: #d4d4d4;
    }

    @keyframes leftslideArrow {
      0%   { transform: translateX(0); }
      50%  { transform: translateX(-6px); }
      100% { transform: translateX(0); }
    }

    @keyframes rightslideArrow {
      0%   { transform: translateX(0); }
      50%  { transform: translateX(6px); }
      100% { transform: translateX(0); }
    }

    .small-image {
      width: 25%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="page">
  <img src="Resources/element1.png" alt="" class="background-element element1">
  <img src="Resources/element2.png" alt="" class="background-element element2">
  <img src="Resources/element3.png" alt="" class="background-element element3">
  <img src="Resources/element5.png" alt="" class="background-element element4">
  <div class="container">
    <img src="Resources/logo.png" alt="ABigPerspectiveLogo" style="width: 50%; margin: 0 auto; display: block; ">
    <p><strong>A Big Perspective</strong> is a work in progress, unofficial level editor for the game A Little Perspective.</p> <br>
    <a href="https://github.com/varskies/ABigPerspective" class="btn-border-to-line-text btn-border-to-line-text--gray">
      <svg width="100%" height="100%">
        <rect x="0" y="0" fill="none" width="100%" height="100%" />
      </svg>
      GITHUB
    </a> <br>
    <div class="link-with-arrow">
      <span class="right-arrow-symbol">›</span>
      <a href="https://store.steampowered.com/app/3485300/A_Little_Perspective/" style="color: #F8779d;">
        Check out A Little Perspective!
      </a>
      <span class="left-arrow-symbol">‹</span>
    </div> <br>
    <img src="Resources/ABPProgress.png" alt="img1" class="image-with-border" style="width: 70%;">
    <p><a href="/">Back to Main</a></p>
  </div>
  </div>
</body>
</html>
