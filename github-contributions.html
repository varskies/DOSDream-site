<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="github-contributions.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Contributions</title>
  <link rel="icon" type="image/png" href="Resources/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      color: #f4f4f4;
      padding: 40px;
      animation: fadeIn 0.7s ease;
    }

    a {
      color: #89a4af;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: #1a1a1a;
      padding: 30px;
      border-radius: 10px;
    }

    img {
      max-width: 100%;
      border-radius: 6px;
      margin: 20px 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    section {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .image-with-border {
      width: 45%;
      height: auto;
      object-fit: contain;
    }

    .small-image {
      width: 25%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GitHub Contributions</h1>
    <p>A graph showcasing my GitHub contribution activity.</p> <br>
    <section class="section">
  <h2>GitHub Contributions</h2>
<div id="calendar"></div>
<div id="legend">
  <span>Less</span>
  <span class="legend-color" style="background:#000000"></span>
  <span class="legend-color" style="background:#2c2c2c"></span>
  <span class="legend-color" style="background:#4d4d4d"></span>
  <span class="legend-color" style="background:#7d7d7d"></span>
  <span class="legend-color" style="background:#f4f4f4"></span>
  <span>More</span>
</div>
<div class="tooltip" id="tooltip"></div>
</section>
  </div>
  <script src="github-contributions.js"></script>
</body>
</html>
