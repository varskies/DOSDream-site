<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="github-contributions.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Contributions</title>
  <link rel="icon" type="image/png" href="Resources/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      color: #f4f4f4;
      padding: 40px;
      animation: fadeIn 0.7s ease;
    }

    a {
      color: #89a4af;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .container {
      max-width: 800px;
      margin: auto;
      background: #1a1a1a;
      padding: 30px;
      border-radius: 10px;
    }

    img {
      max-width: 100%;
      border-radius: 6px;
      margin: 20px 0;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    section {
      display: flex;
      justify-content: center;
      gap: 10px;
    }

    .image-with-border {
      width: 45%;
      height: auto;
      object-fit: contain;
    }

    .small-image {
      width: 25%;
      height: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>GitHub Contributions</h1>
    <p>A graph showcasing my GitHub contribution activity.</p> <br>
    <section class="section">
</div>
<div id="calendar"></div>
<div class="tooltip" id="tooltip"></div>
</section>
  </div>
<script>const GITHUB_USER = "varskies";
const COLORS = ["#000000", "#2c2c2c", "#4d4d4d", "#7d7d7d", "#f4f4f4"];
const DAYS = ["Mon", "Wed", "Fri"];

const graphQLQuery = `
query userCalendar($login: String!) {
  user(login: $login) {
    contributionsCollection {
      contributionCalendar {
        weeks {
          contributionDays {
            date
            contributionCount
          }
        }
      }
    }
  }
}
`;

async function getContributionData() {
  const res = await fetch("calendar.json?v=" + Date.now());
  const weeks = await res.json();
  return weeks;
}

async function renderCalendar() {
  const weeks = await getContributionData();
  const container = document.getElementById("calendar");
  const tooltip = document.getElementById("tooltip");

  const cols = weeks.length;
  const rows = 7;
  const cellSize = 15;
  const gap = 3;
  const width = cols * (cellSize + gap) + 40;
  const height = rows * (cellSize + gap) + 30;

  const allDays = weeks.flatMap(w => w.contributionDays);
  const maxCommits = Math.max(...allDays.map(d => d.contributionCount), 1);

  let svg = `<svg width="${width}" height="${height}" xmlns="http://www.w3.org/2000/svg">`;

  const DAY_POSITIONS = [
    {label:"Mon", row:1},
    {label:"Wed", row:3},
    {label:"Fri", row:5}
  ];

  DAY_POSITIONS.forEach(day=>{
    const y = day.row * (cellSize + gap) + 22 + cellSize/1.5;

    svg += `<text x="35" y="${y}"
                class="day"
                font-family="'Inter', sans-serif"
                font-weight="400">${day.label}</text>`;
  });

  const monthLabels = {};
  weeks.forEach((week, col) => {
    week.contributionDays.forEach((day, row) => {
      const date = new Date(day.date);
      const month = date.toLocaleString('default', { month: 'short' });
      if (!monthLabels[month] && date.getDate() <= 7) {
        monthLabels[month] = col;
      }
    });
  });

  for(const [month,col] of Object.entries(monthLabels)) {
    svg += `<text x="${col*(cellSize+gap)+40}" y="12" 
                  class="month" 
                  font-family="'Inter', sans-serif"
                  font-weight="400">${month}</text>`;
  }

  weeks.forEach((week, col) => {
    week.contributionDays.forEach((day, row) => {
      const count = day.contributionCount;
      let level = 0;

      if (count > 0) {
        const normalized = count / maxCommits;
        level = Math.ceil(normalized * 4);
      }
      const color = COLORS[level];

      const x = col * (cellSize + gap) + 40;
      const y = row * (cellSize + gap) + 20;

      svg += `<rect x="${x}" y="${y}" width="${cellSize}" height="${cellSize}" fill="${color}" 
                data-date="${day.date}" data-count="${count}"></rect>`;
    });
  });

  svg += "</svg>";
  container.innerHTML = svg;

  container.querySelectorAll("rect").forEach(rect => {
    rect.addEventListener("mouseenter", e => {
      const date = e.target.dataset.date;
      const count = e.target.dataset.count;
      tooltip.textContent = `${count} commit${count==1?'':'s'} on ${date}`;
      tooltip.style.opacity = 1;
    });
    rect.addEventListener("mousemove", e => {
      const tooltipWidth = tooltip.offsetWidth;
      const tooltipHeight = tooltip.offsetHeight;
      const offset = 10;
      let left = e.pageX + offset;
      let top = e.pageY + offset;

      if (e.pageX + tooltipWidth + offset > window.innerWidth) {
        left = e.pageX - tooltipWidth - offset;
      }
      if (e.pageY + tooltipHeight + offset > window.innerHeight) {
        top = e.pageY - tooltipHeight - offset;
      }

      tooltip.style.left = left + "px";
      tooltip.style.top = top + "px";
    });
    rect.addEventListener("mouseleave", () => {
      tooltip.style.opacity = 0;
    });
  });
}

document.fonts.ready.then(() => {
  renderCalendar();
});
</script>
</body>
</html>
